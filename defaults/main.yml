---
# defaults file for vm_revert

# This is the server acting as the host server for the virtual machine. Keeping
# in mind the warning about the `vm_revert` variable, a perfect place for this
# and other variables ***except for `vm_revert`*** is in the host_vars file for
# the inventory item. Commands are delegated to this host for execution. The
# actual default for this does supply a hint, but is not shown here for clarity.
vmhost: "{{ undef(hint='vmhost must be explicitly defined as the host on which the virtual machine is running') }}"

# Whether or not the VM guest should be rebooted and reverted to a snapshot
# (rolled back). This is defaulted to false for a reason as a protection. Set to
# true only if you know what you are doing.
#
# CAUTION!  Do not enable this setting unless you want a virtual machine to
# reboot and reverted back to a previously created snapshot. Because of the
# nature of this variable, it ***should never be placed in a `group_vars`
# file***. Indeed, it is strongly advised that it not be put in a `host_vars`
# file or playbook either. See README.md for more details!
#
# You have been warned!!!
vm_revert: false

# This is the name of the snapshot which will be used in the `virsh
# snapshot-revert` command, which is in fact the default name the first time you
# create a snapshot using `virt-manager`. Ideally set in the host_vars file for
# the virtual machine if it differs from the default.
vm_revert_snapshot: "snapshot1"

# How long to delay in seconds before starting to check to see if the machine
# has restarted. Unlikely to be needed, but provided for ease of overriding
# should it ever become necessary.
vm_wait_delay: 10

# How long to keep trying in seconds after the delay before we consider the
# restart to have failed. Unlikely to be needed, but provided for ease of
# overriding should it ever become necessary.
vm_wait_timeout: 90

# Whether or not to regather facts after the restart. Default is `true`, since
# if we revert to a snapshot, our previously gathered facts are now out-of-date.
# It is unlikely that you will ever want to override this, but provided for ease
# just in case.
vm_regather_facts: true
