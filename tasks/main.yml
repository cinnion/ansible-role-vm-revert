---
# Sub-playbook to destroy and revert pell

- name: Destroy VMs
  virt:
    name: "{{inventory_hostname}}"
    state: destroyed
  delegate_to: r720

- name: Revert VMs from snapshot1
  command: "virsh snapshot-revert {{inventory_hostname}} --snapshotname snapshot1"
  delegate_to: r720

- name: Restart VM
  virt:
    name: "{{inventory_hostname}}"
    state: running
  delegate_to: r720

- name: Wait for the machine to have rebooted.
  wait_for_connection:
    delay: 10
    timeout: 90

#    port: 22
#    host: '{{ (ansible_ssh_host|default(ansible_host))|default(inventory_hostname) }}'
#    delay: 10
#  connection: local

- name: Debug playbook variables
  vars:
    msg: |
      Host name:                {{ inventory_hostname }}

  debug:
    msg: "{{ msg.split('\n') }}"
    verbosity: 1

- name: Debug variables as a whole
  vars:
    msg: |
      Module Variables ("vars"):
       --------------------------------
       {{ vars | to_nice_json }}

       Environment Variables ("environment"):
       --------------------------------
       {{ environment | to_nice_json }}

       GROUP NAMES Variables ("group_names"):
       --------------------------------
       {{ group_names | to_nice_json }}

       GROUPS Variables ("groups"):
       --------------------------------
       {{ groups | to_nice_json }}

       HOST Variables ("hostvars"):
       --------------------------------
       {{ hostvars | to_nice_json }}

  debug:
    msg: "{{ msg.split('\n') }}"
    verbosity: 4
